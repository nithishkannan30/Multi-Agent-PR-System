spring.application.name=MultiAgentsForPR
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant



spring.datasource.url=jdbc:mysql://localhost:3306/pr_review_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


github.token=${GITHUB_TOKEN}
github.webhook.secret=${GITHUB_WEBHOOK_SECRET}


huggingface.api-key=${HUGGINGFACE_API_KEY}
huggingface.embedding-model=sentence-transformers/all-MiniLM-L6-v2


resilience4j.circuitbreaker.instances.groqLLM.sliding-window-size=10
resilience4j.circuitbreaker.instances.groqLLM.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.groqLLM.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.groqLLM.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.groqLLM.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.groqLLM.automatic-transition-from-open-to-half-open-enabled=true


management.endpoints.web.exposure.include=health,circuitbreakers,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=MultiAgentsForPR